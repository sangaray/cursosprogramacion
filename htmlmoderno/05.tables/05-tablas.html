<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablas</title>
</head>

<body>
  <h1>TABLAS</h1>
  <h2>Tabla de Personal de Gym</h2>
  <table>
    <tr>
      <th>NOMBRE</th>
      <th>APELLIDO</th>
      <th>CÓDIGO</th>
      <th>PAÍS</th>
    </tr>
    <tr>
      <td>Victor</td>
      <td>Cruz</td>
      <td>12358</td>
      <td>México</td>
    </tr>
    <tr>
      <td>José</td>
      <td>Medina</td>
      <td>415684</td>
      <td>Perú</td>
    </tr>
    <tr>
      <td>María</td>
      <td>López</td>
      <td>268455</td>
      <td>Colombia</td>
    </tr>
  </table>
  <br>
  <table style="width: 100%">
    <style>
      table,
      th,
      td {
        border: 1px solid skyblue;
      }
    </style>
    <!-- Class aquí se usa para indicar que la tabla es única -->
    <caption>REPORTE DE VENTAS</caption>
    <thead>
      <tr>
        <th scope="col">PRODUCTO</th>
        <th scope="col">VENTAS</th>
        <th scope="col">CANTIDAD</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <th scope="row">Licencia PRO</th>
        <td>8</td>
        <td>10</td>
      </tr>
      <tr>
        <th scope="row">Licencia BASIC</th>
        <td>20</td>
        <td>15</td>
      </tr>
    </tbody>

    <tfoot>
      <tr>
        <th scope="row">TOTAL</th>
        <td>28</td>
        <td>25</td>
      </tr>
    </tfoot>
  </table>
  </table>
</body>

</html>
