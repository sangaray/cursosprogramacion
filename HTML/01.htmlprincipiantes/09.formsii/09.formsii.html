<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formularios II</title>

  <style>
    body {
      background-color: #3c3b3b;
      color: #eae7e7;
    }
  </style>
</head>

<body>
  <h1>Formularios II</h1>
  <form action="archivo.php">
    <!-- Elementos de Formularios Clase Anterior -->
    <div>
      <label for="nombre">Nombre</label>
      <input type="text" name="nombre" id="nombre">
    </div>
    <br>
    <div>
      <label for=" apellido">Apellido</label>
      <input type="text" name="apellido" id="apellido" placeholder="Primer Apellido">
    </div>
    <br>
    <div>
      <label for="telefono" id="telefono">Teléfono</label>
      <input type="number" name="telefono" id="telefono" maxlength="8">
    </div>
    <br>
    <div>
      <label for="contraseña" id="contraseña">Conraseña</label>
      <input type="password" name="contraseña" id="contraseña">
    </div>

    <!-- Nuevos Elementos de Formularios -->
    <div>
      <label for="genero">Género</label>
      <br>
      <input type="radio" name="genero" id="hombre"> Hombre
      <input type="radio" name="genero" id="mujer"> Mujer
    </div>

    <div>
      <label for="mensaje">Mensaje</label>
      <textarea name="mensaje" id="mensaje" cols="30" rows="4">
      </textarea>
    </div>
    <br>
    <div>
      <label for="edad">Edad</label>
      <input type="text" name="edad" id="edad" maxlength="2" value="25">
    </div>
    <br>
    <div>
      <label for="fecha">Fecha de Nacimiento</label>
      <input type="date" name="fecha" id="fecha">
    </div>
    <br>
    <div>
      <label for="selecmul">Selecciona una materia</label>
      <select name="selecmul">
        <option value="Cáculo I">Cálculo I</option>
        <option value="Físca">Físca</option>
        <option value="Química">Química</option>
        <option value="Redes">Redes</option>
        <option value="Programación">Programación</option>
      </select>
    </div>
    <div>
      <input type="button" value="Enviar">
      <input type="submit" value="Enviar">
    </div>
    <div>
      <input type="color" name="color">
    </div>
  </form>
  <br>
  <footer>
    Página creada por Yacklyon en 2026

  </footer>
</body>

</html>
