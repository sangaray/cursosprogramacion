<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formularios</title>
</head>

<body>
  <header>
    <h1>Formulario de Registro</h1>
  </header>
  <main>
    <form action="/procesar" method="post" autocomplete="on">
      <fieldset>
        <legend>Información Personal</legend>
        <p>
          <label for="nombre">Nombre Completo:</label><br>
          <input type="text" name="nombre" id="nombre" required minlength="3" placeholder="ej. Mario Bros">
        </p>
        <p>
          <label for="correo">Correo Electrónico:</label><br>
          <input type="email" name="correo" id="correo" required placeholder="ejemplo@gmail.com">
        </p>
        <p>
          <label for="telefono">Teléfono:</label><br>
          <input type="tel" name="telefono" id="telefono" pattern="[0-9][8]">
        </p>
        <p>
          <label for="fecha">Fecha de Nacimiento:</label><br>
          <input type="date" name="fecha" id="fecha">
        </p>
      </fieldset>
      <fieldset>
        <legend>Información de la Cuenta</legend>
        <p>
          <label for="usuario">usuario</label>
          <input type="text" name="usuario" id="usuario" required autocomplete="username">
        </p>
        <p>
          <label for="password">Contraseña:</label><br>
          <input type="password" name="password" id="password" required minlength="6" autocomplete="new-password">
        </p>
      </fieldset>
      <p>
        <input type="checkbox" name="terminos" id="terminos" required>
        <label for="terminos">Acepto los términos y condiciones</label>
      </p>
      <button type="submit">Enviar</button>
      <button type="reset">Limpiar</button>
    </form>
  </main>

  </main>
</body>

</html>
