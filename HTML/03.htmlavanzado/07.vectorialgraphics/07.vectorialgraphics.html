<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso HTML</title>
</head>

<body>
  <svg width="400" height="400" style="border: 1px solid blue;">
    <rect x="80" y="80" width="300" height="100" style="fill: greenyellow; stroke: green; stroke-width: 20;" />
  </svg>

  <svg width="400" height="400" style="border: 1px solid blue;">
    <circle cx="160" cy="200" r="100" style="fill: cyan; stroke: black; stroke-width: 10;" />
  </svg>

  <svg width="400" height="400" style="border: 1px solid blue;">
    <rect x="60" y="20" rx="20" ry="20" width="200" height="200"
      style="fill: yellow; stroke: black; stroke-width: 8;" />
  </svg>

</body>

</html>
