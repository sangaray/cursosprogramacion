<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso HTML</title>

</head>

<body>

  <form>
    <label for="fecha-de-nacimiento">Fecha de Nacimiento</label>
    <input type="date" id="fecha-de-nacimiento" name="f-nac">
  </form>
  <h1>Compra de Tickets</h1>
  <form>
    <label for="datomax">Fecha de Compra</label>
    <input type="date" id="datomax" max="2020-05-20">
    <br>
    <label for="phone">Ingrese su número</label>
    <input type="tel" id="phone" pattern="[0-9]{3}-[0-9]{8}" placeholder="123-xxxxxxxx">
    <br>
    <label for="cantidad">Número de Entradas</label>
    <input type="number" id="cantidad" min="1" max="12">
    <br>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" size="11">
    <br>
    <label for="pin">Pin:</label>
    <input type="text" id="pin" name="pin" size="6">

    <br>
    <input type="submit" value="Enviar">
    <br>


  </form>
</body>

</html>
